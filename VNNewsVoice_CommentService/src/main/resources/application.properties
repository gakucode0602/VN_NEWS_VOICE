spring.application.name=VNNewsVoice-CommentService
server.port=${COMMENT_SERVICE_PORT:8083}

# Database — loaded from .env.properties
spring.datasource.url=${COMMENT_DB_URL}
spring.datasource.username=${COMMENT_DB_USERNAME}
spring.datasource.password=${COMMENT_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Load secrets from .env.properties (never commit that file)
spring.config.import=optional:file:.env.properties

# JWT (verify only — AuthService signs)
app.jwt.legacy-secret=${JWT_SECRET:}
app.auth.jwks-url=${AUTH_JWKS_URL:http://localhost:8084/api/.well-known/jwks.json}
app.auth.jwks-connect-timeout-ms=${AUTH_JWKS_CONNECT_TIMEOUT_MS:2000}
app.auth.jwks-read-timeout-ms=${AUTH_JWKS_READ_TIMEOUT_MS:2000}
app.auth.jwks-cache-lifespan-seconds=${AUTH_JWKS_CACHE_LIFESPAN_SECONDS:900}
app.auth.jwks-cache-refresh-seconds=${AUTH_JWKS_CACHE_REFRESH_SECONDS:300}
app.jwt.issuer=${JWT_ISSUER:vnnewsvoice-auth-service}
app.jwt.audience=${JWT_AUDIENCE:vnnewsvoice-services}
app.jwt.allow-legacy-hs256=${JWT_ALLOW_LEGACY_HS256:true}
app.jwt.verify-issuer-audience=${JWT_VERIFY_ISSUER_AUDIENCE:true}

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}

# RabbitMQ — consume article.events.comment-service (fanout)
spring.rabbitmq.host=${COMMENT_RABBITMQ_HOST:${RABBITMQ_HOST:localhost}}
spring.rabbitmq.port=${COMMENT_RABBITMQ_PORT:${RABBITMQ_PORT:5672}}
spring.rabbitmq.username=${COMMENT_RABBITMQ_USERNAME:${RABBITMQ_USERNAME:admin}}
spring.rabbitmq.password=${COMMENT_RABBITMQ_PASSWORD:${RABBITMQ_PASSWORD}}
spring.rabbitmq.virtual-host=${COMMENT_RABBITMQ_VHOST:${RABBITMQ_VHOST:/}}
