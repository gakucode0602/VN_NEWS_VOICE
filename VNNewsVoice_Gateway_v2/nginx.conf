events {}

http {
	include       mime.types;
	default_type  application/octet-stream;

	sendfile on;
	keepalive_timeout 65;

	map $http_upgrade $connection_upgrade {
		default upgrade;
		''      close;
	}

	map $http_origin $cors_origin {
		default '';
		~^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$ $http_origin;
		https://vnnewsvoice-frontend-user.vercel.app $http_origin;
		https://vnnewsvoice-frontend-admin.vercel.app $http_origin;
	}

	# ---------------------------------------------------------------------------
	# Rate limiting zones (shared memory, per IP address)
	# ---------------------------------------------------------------------------
	# login/register: 5 req/min — brute-force & spam protection
	limit_req_zone $binary_remote_addr zone=login:10m   rate=5r/m;
	# chat (RAG): 10 req/min — Gemini API & LLM cost protection (Layer 1)
	limit_req_zone $binary_remote_addr zone=chat:10m    rate=10r/m;
	# public API: 60 req/min — general scraping protection
	limit_req_zone $binary_remote_addr zone=api_pub:10m rate=60r/m;
	# Return HTTP 429 (not default 503) when rate limit exceeded
	limit_req_status 429;

	server {
		listen 80;
		server_name _;

		# Forward bearer token explicitly for all proxied API routes.
		proxy_set_header Authorization $http_authorization;

		# Ensure gateway is the single source of CORS headers.
		proxy_hide_header Access-Control-Allow-Origin;
		proxy_hide_header Access-Control-Allow-Credentials;
		proxy_hide_header Access-Control-Allow-Methods;
		proxy_hide_header Access-Control-Allow-Headers;
		proxy_hide_header Access-Control-Expose-Headers;

		location = /health {
			add_header Content-Type text/plain;
			return 200 'ok';
		}

		# Basic CORS for browser clients (admin + public frontend).
		add_header Access-Control-Allow-Origin $cors_origin always;
		add_header Access-Control-Allow-Credentials "true" always;
		add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
		add_header Access-Control-Allow-Headers "Authorization,Content-Type,Accept,Origin,X-Requested-With" always;

		if ($request_method = OPTIONS) {
			return 204;
		}

		# AuthService public auth and refresh/logout endpoints.
		location ^~ /api/user/ {
			# 5 req/min per IP — brute-force & registration spam protection
			limit_req zone=login burst=3 nodelay;
			proxy_pass http://vnnewsvoice-auth:8084/api/user/;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		location ^~ /api/auth/ {
			# 60 req/min per IP — token refresh called automatically by frontend
			limit_req zone=api_pub burst=10 nodelay;
			proxy_pass http://vnnewsvoice-auth:8084/api/auth/;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			# Preserve Set-Cookie Path as seen by the browser (through gateway).
			proxy_cookie_path /api/auth /api/auth;
		}

		# AuthService admin user-management endpoints used by React Admin.
		location ^~ /api/secure/admin/users {
			proxy_pass http://vnnewsvoice-auth:8084;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		# AuthService reader profile endpoints used by public frontend.
		location ^~ /api/secure/profile {
			proxy_pass http://vnnewsvoice-auth:8084;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		location = /api/secure/change-password {
			proxy_pass http://vnnewsvoice-auth:8084/api/secure/change-password;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		location = /api/.well-known/jwks.json {
			proxy_pass http://vnnewsvoice-auth:8084/api/.well-known/jwks.json;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		# CommentService routes.
		location ~ ^/api/articles/[^/]+/comments(?:/.*)?$ {
			proxy_pass http://vnnewsvoice-comment:8083;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		location ~ ^/api/secure/articles/[^/]+/comments(?:/.*)?$ {
			proxy_pass http://vnnewsvoice-comment:8083;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		location ~ ^/api/(secure/)?comments(?:/.*)?$ {
			proxy_pass http://vnnewsvoice-comment:8083;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		# RAG Service (deployed on RunPod — URL injected via RAG_UPSTREAM_URL env var).
		location ^~ /chat/ {
			# 10 req/min per IP — Layer 1 RAG cost protection (Layer 2: per-user in RAG service)
			limit_req zone=chat burst=5 nodelay;
			proxy_pass ${RAG_UPSTREAM_URL}/api/v1/chat/;
			proxy_http_version 1.1;
			proxy_redirect off;
			proxy_set_header Authorization $http_authorization;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $proxy_host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_ssl_server_name on;
			proxy_read_timeout 300s;
		}

		# Compatibility alias for older frontend paths.
		location ^~ /api/v1/ {
			# 10 req/min per IP — same RAG zone as /chat/
			limit_req zone=chat burst=5 nodelay;
			proxy_pass ${RAG_UPSTREAM_URL}/api/v1/;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $proxy_host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_ssl_server_name on;
			proxy_read_timeout 300s;
		}

		# Fallback /api to ArticleService.
		# Do not use ^~ here so regex routes above (e.g. comment paths) can take precedence.
		location /api/ {
			# 60 req/min per IP — general public API scraping protection
			limit_req zone=api_pub burst=20 nodelay;
			proxy_pass http://vnnewsvoice-article:8080;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}
	}
}
