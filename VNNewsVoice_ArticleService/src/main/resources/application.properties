server.port=${ARTICLE_SERVICE_PORT:8080}
spring.application.name=article-service
spring.config.import=optional:file:.env.properties

# PostgreSQL
spring.datasource.url=${ARTICLE_DB_URL}
spring.datasource.username=${ARTICLE_DB_USERNAME}
spring.datasource.password=${ARTICLE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT (verify only — AuthService signs)
app.jwt.legacy-secret=${JWT_SECRET:}
app.auth.jwks-url=${AUTH_JWKS_URL:http://localhost:8084/api/.well-known/jwks.json}
app.auth.jwks-connect-timeout-ms=${AUTH_JWKS_CONNECT_TIMEOUT_MS:2000}
app.auth.jwks-read-timeout-ms=${AUTH_JWKS_READ_TIMEOUT_MS:2000}
app.auth.jwks-cache-lifespan-seconds=${AUTH_JWKS_CACHE_LIFESPAN_SECONDS:900}
app.auth.jwks-cache-refresh-seconds=${AUTH_JWKS_CACHE_REFRESH_SECONDS:300}
app.jwt.issuer=${JWT_ISSUER:vnnewsvoice-auth-service}
app.jwt.audience=${JWT_AUDIENCE:vnnewsvoice-services}
app.jwt.allow-legacy-hs256=${JWT_ALLOW_LEGACY_HS256:true}
app.jwt.verify-issuer-audience=${JWT_VERIFY_ISSUER_AUDIENCE:true}

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}

# CORS (Admin Frontend)
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://vn-news-voice-frontend.vercel.app,https://vnnewsvoice-frontend-user.vercel.app,https://vnnewsvoice-frontend-admin.vercel.app}

# RabbitMQ — AMQP consumer (fanout article.events → article.events.article-service)
spring.rabbitmq.host=${ARTICLE_RABBITMQ_HOST:${RABBITMQ_HOST:localhost}}
spring.rabbitmq.port=${ARTICLE_RABBITMQ_PORT:${RABBITMQ_PORT:5672}}
spring.rabbitmq.username=${ARTICLE_RABBITMQ_USERNAME:${RABBITMQ_USERNAME:admin}}
spring.rabbitmq.password=${ARTICLE_RABBITMQ_PASSWORD:${RABBITMQ_PASSWORD}}
spring.rabbitmq.virtual-host=${ARTICLE_RABBITMQ_VHOST:${RABBITMQ_VHOST:/}}

# Article lifecycle retention purge (hard-delete DELETED articles older than N days)
article.lifecycle.purge.enabled=${ARTICLE_LIFECYCLE_PURGE_ENABLED:true}
article.lifecycle.purge.retention-days=${ARTICLE_LIFECYCLE_PURGE_RETENTION_DAYS:30}
article.lifecycle.purge.batch-size=${ARTICLE_LIFECYCLE_PURGE_BATCH_SIZE:100}
article.lifecycle.purge.cron=${ARTICLE_LIFECYCLE_PURGE_CRON:0 0 2 * * *}
