version: '3.8'

services:
  # --------------------------------------------------------------------------
  # 1. PostgreSQL (For Backend and MLflow)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: vnnewsvoice_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mlflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-script.sql:/docker-entrypoint-initdb.d/init-script.sql

  # --------------------------------------------------------------------------
  # 2. RabbitMQ (Message Broker for async tasks and events)
  # --------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vnnewsvoice_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
      - "15692:15692" # Prometheus metrics (rabbitmq_prometheus plugin)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro

  # --------------------------------------------------------------------------
  # 3. Qdrant (Vector Database for RAG)
  # --------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: vnnewsvoice_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST/Web UI
      - "6334:6334"   # gRPC
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage

  # --------------------------------------------------------------------------
  # 4. Redis (Caching & Job Queues for RAG)
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: vnnewsvoice_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  # --------------------------------------------------------------------------
  # 5. MinIO (S3-compatible storage for DVC and MLflow artifacts)
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio
    container_name: vnnewsvoice_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Web UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data

  # --------------------------------------------------------------------------
  # 6. MLflow Tracking Server (For ViT5 Q-LoRA experiments)
  # --------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: vnnewsvoice_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    command: >
      sh -c "pip install psycopg2-binary boto3 &&
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/mlflow_db
      --default-artifact-root s3://mlflow-artifacts
      --host 0.0.0.0 --port 5000"
    depends_on:
      - minio
      - postgres
    volumes:
      - mlflow_data:/mlflow

  # --------------------------------------------------------------------------
  # 7. Prometheus (Metrics scraping from all services)
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: vnnewsvoice_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"

  # --------------------------------------------------------------------------
  # 8. Grafana (Metrics visualization and alerting)
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: vnnewsvoice_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki

  # --------------------------------------------------------------------------
  # 9. Loki (Log aggregation)
  # --------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.0
    container_name: vnnewsvoice_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  # --------------------------------------------------------------------------
  # 10. Promtail (Log shipper — scrapes Docker container stdout/stderr)
  # --------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:2.9.0
    container_name: vnnewsvoice_promtail
    restart: unless-stopped
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

# --------------------------------------------------------------------------
# Persistent Volumes
# --------------------------------------------------------------------------
volumes:
  postgres_data:
  rabbitmq_data:
  qdrant_data:
  redis_data:
  minio_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
  loki_data:
