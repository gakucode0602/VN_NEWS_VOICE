server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://vnnewsvoice_loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use container name as the "service" label
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: service
      # Keep the container name as a label too
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      # Add compose project label if available
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      # Only collect logs from vnnewsvoice containers
      - source_labels: [__meta_docker_container_name]
        regex: /vnnewsvoice.*
        action: keep
