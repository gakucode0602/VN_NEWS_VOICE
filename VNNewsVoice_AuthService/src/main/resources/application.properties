server.port=${AUTH_SERVICE_PORT:8084}
spring.application.name=auth-service
spring.config.import=optional:file:.env.properties

# Database
spring.datasource.url=${AUTH_DB_URL}
spring.datasource.username=${AUTH_DB_USERNAME}
spring.datasource.password=${AUTH_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.legacy-secret=${JWT_SECRET:}
app.jwt.expiration-ms=${JWT_EXPIRATION:900000}
app.jwt.issuer=${JWT_ISSUER:vnnewsvoice-auth-service}
app.jwt.audience=${JWT_AUDIENCE:vnnewsvoice-services}
app.jwt.key-id=${JWT_KEY_ID:vnnewsvoice-auth-rs256-k1}
app.jwt.rsa-private-key-base64=${JWT_RSA_PRIVATE_KEY_BASE64:}
app.jwt.rsa-public-key-base64=${JWT_RSA_PUBLIC_KEY_BASE64:}
app.jwt.allow-legacy-hs256=${JWT_ALLOW_LEGACY_HS256:true}
app.jwt.verify-issuer-audience=${JWT_VERIFY_ISSUER_AUDIENCE:true}
app.jwks.cache-control-max-age-seconds=${JWKS_CACHE_CONTROL_MAX_AGE_SECONDS:300}

# Refresh Token
app.auth.refresh-token.expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS:7}
app.auth.refresh-cookie.name=${AUTH_REFRESH_COOKIE_NAME:refreshToken}
app.auth.refresh-cookie.path=${AUTH_REFRESH_COOKIE_PATH:/api/auth}
# For cross-origin deployments (frontend on Vercel, API on DigitalOcean):
#   Set AUTH_REFRESH_COOKIE_SAME_SITE=None and AUTH_REFRESH_COOKIE_SECURE=true (requires HTTPS on gateway).
#   Without HTTPS, use AUTH_REFRESH_COOKIE_SAME_SITE=Lax only for same-origin setups.
app.auth.refresh-cookie.secure=${AUTH_REFRESH_COOKIE_SECURE:false}
app.auth.refresh-cookie.http-only=${AUTH_REFRESH_COOKIE_HTTP_ONLY:true}
app.auth.refresh-cookie.same-site=${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
app.auth.refresh-cookie.domain=${AUTH_REFRESH_COOKIE_DOMAIN:}
app.refresh-token.cleanup-cron=0 0 0 ? * SUN

# Cloudinary
CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}

# Google OAuth
GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# RabbitMQ — publish user.events (user.locked / user.unlocked) for downstream services
spring.rabbitmq.host=${AUTH_RABBITMQ_HOST:${RABBITMQ_HOST:localhost}}
spring.rabbitmq.port=${AUTH_RABBITMQ_PORT:${RABBITMQ_PORT:5672}}
spring.rabbitmq.username=${AUTH_RABBITMQ_USERNAME:${RABBITMQ_USERNAME:admin}}
spring.rabbitmq.password=${AUTH_RABBITMQ_PASSWORD:${RABBITMQ_PASSWORD}}
spring.rabbitmq.virtual-host=${AUTH_RABBITMQ_VHOST:${RABBITMQ_VHOST:/}}
