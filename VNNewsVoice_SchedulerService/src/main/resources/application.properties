spring.application.name=VNNewsVoice-SchedulerService
server.port=${SCHEDULER_SERVICE_PORT:8085}

# RabbitMQ connection — loaded from .env.properties
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=/

# Crawl schedule — fixed delay + initial delay (legacy-compatible)
# 4h = 14,400,000 ms ; 10m = 600,000 ms
crawler.scheduling.enabled=${CRAWLER_SCHEDULING_ENABLED:true}
crawl.schedule.fixed-delay-ms=${CRAWL_SCHEDULE_FIXED_DELAY_MS:14400000}
crawl.schedule.initial-delay-ms=${CRAWL_SCHEDULE_INITIAL_DELAY_MS:60000}

# Load secrets from .env.properties (never commit that file)
spring.config.import=optional:file:.env.properties

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}

# Logging
logging.level.com.pmq.vnnewsvoice.scheduler=INFO
