[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    e2e: End-to-end tests for API endpoints
    slow: Tests that take longer to run (e.g., LLM calls)

# Coverage
addopts =
    --strict-markers
    --verbose
    --color=yes
    -ra

# Coverage configuration
[coverage:run]
source = app
omit =
    */tests/*
    */scripts/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
